* { margin:0; padding:0; box-sizing:border-box; }
@import url('https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=Inter:wght@400;500;600&display=swap');

.banner {
  position:relative; overflow:hidden;
  font-family:'Inter',sans-serif;
}
.bg {
  position:absolute; inset:0;
  background:
    radial-gradient(ellipse 120% 120% at 15% 60%, #012d52 0%, transparent 65%),
    radial-gradient(ellipse 80% 80% at 85% 10%, #0a4a7c 0%, transparent 60%),

  position:absolute; inset:0;

}
.accent { position:absolute; left:0; top:0; bottom:0; width:4px;

.glow {
  position:absolute; border-radius:50%;

  pointer-events:none;
}
.tag {
  display:inline-flex; align-items:center; gap:6px;

  border-radius:100px; padding:3px 10px; margin-bottom:12px;
}
.tag-dot { width:5px; height:5px; background:#dc0032; border-radius:50%; }
.tag-text { font-size:10px; font-weight:500; color:rgba(255,255,255,.7);
  letter-spacing:1.5px; text-transform:uppercase; }
.headline { font-family:'Syne',sans-serif; font-weight:800; color:#fff; letter-spacing:-0.5px; line-height:1.1; }
.sub { color:rgba(255,255,255,.55); line-height:1.5; }
.brand { display:flex; align-items:center; gap:8px; }
.brand img { border-radius:6px; }
.brand span { font-family:'Syne',sans-serif; font-weight:700; color:rgba(255,255,255,.85); }

html,body { width:440px; height:280px; overflow:hidden; }
.banner { width:440px; height:280px; }
</style>
