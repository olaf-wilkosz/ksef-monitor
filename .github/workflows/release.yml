name: Release

on:
    push:
        tags:
            - "v*"

jobs:
    release:
        runs-on: ubuntu-latest
        permissions:
            contents: write

        steps:
            - name: Checkout
              uses: actions/checkout@v4

            - name: Setup Node
              uses: actions/setup-node@v4
              with:
                  node-version: "24"

            - name: Setup pnpm
              uses: pnpm/action-setup@v4
              with:
                  version: 10

            - name: Install dependencies
              run: pnpm install --frozen-lockfile

            - name: Odczytaj wersję z manifest.json
              id: version
              run: |
                  VERSION=$(jq -r '.version' extension/manifest.json)
                  echo "version=$VERSION" >> $GITHUB_OUTPUT

            - name: Zbuduj ZIP Chrome
              run: |
                  cd extension
                  zip -r ../ksef-monitor-${{ steps.version.outputs.version }}-chrome.zip . --exclude="*.DS_Store"

            - name: Zbuduj ZIP Firefox
              run: node build-firefox.mjs

            - name: Zbuduj archiwum źródeł (dla AMO)
              run: |
                  git archive --format=zip --output=ksef-monitor-source.zip HEAD

            - name: Utwórz GitHub Release
              uses: softprops/action-gh-release@v2
              with:
                  name: "KSeF Monitor v${{ steps.version.outputs.version }}"
                  files: |
                      ksef-monitor-${{ steps.version.outputs.version }}-chrome.zip
                      ksef-monitor-${{ steps.version.outputs.version }}-firefox.zip
                  generate_release_notes: true

            - name: Opublikuj na AMO (Firefox)
              run: |
                  pnpm dlx web-ext sign \
                    --source-dir dist-firefox \
                    --channel listed \
                    --api-key ${{ secrets.AMO_ISSUER }} \
                    --api-secret ${{ secrets.AMO_SECRET }} \
                    --upload-source-code ksef-monitor-source.zip \
                    --no-input
              continue-on-error: true
              # continue-on-error: AMO sign może trwać długo lub wymagać ręcznej recenzji
              # błąd tutaj nie blokuje tworzenia GitHub Release
