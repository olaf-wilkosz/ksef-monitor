name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Odczytaj wersję z manifest.json
        id: version
        run: |
          VERSION=$(jq -r '.version' extension/manifest.json)
          echo "version=$VERSION" >> $GITHUB_OUTPUT

      - name: Zbuduj ZIP
        run: |
          cd extension
          zip -r ../ksef-monitor-${{ steps.version.outputs.version }}.zip . --exclude="*.DS_Store"

      - name: Utwórz GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: "KSeF Monitor v${{ steps.version.outputs.version }}"
          files: ksef-monitor-${{ steps.version.outputs.version }}.zip
          generate_release_notes: true
